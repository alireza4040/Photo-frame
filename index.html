<style type="Text/css">

* { box-sizing: border-box; }

html, body 
  {
  height: 100%;
  margin: 0;
}

body
  {
  overflow : hidden;
  display : grid;
  place-items : center;
  background : radial-gradient(circle at center, #ffdde1 0%, #f7c8e7 30%, #e9c4ff 70%, #d6e4ff 100%);
  padding : 16px;
  justify-content: center;
  align-items: center;
}

.frame
  {
  width: min(82vw, calc(78vh * 562 / 1000), 390px);
  aspect-ratio : 562 / 1000;
  background : #ffffff;
  border : 3px solid #ffb6c1;
  border-radius : 26px;
  overflow : hidden;
  box-shadow : 0 28px 55px rgba(255, 105, 180, 0.5), 0 18px 30px rgba(0, 0, 0, 0.2);
  overflow : hidden;
  position : relative;
}
	
.frame::after
	{
	content : "";
	position : absolute;
	inset : 0;
	background : radial-gradient(circle at 10% 10%, rgba(255,200,220,0.35)0%, transparent 45%) ,
	radial-gradient(circle at 80% 15%, rgba(255,220,180,0.25)0%, transparent 45%) ,
		radial-gradient(circle at calc(100% - 25px) calc(100% - 25px), rgba(255,255,255,0.65)0.5%,rgba(255,255,255,0.20)20%,rgba(255,255,255,0.07)38%,transparent 70%),
	linear-gradient(180deg, rgba(255,255,255,0.05)0%, rgba(255,255,255,0.08)100%);
	z-index : 5;
	pointer-events : none;
}

.inner
   {
   width : 100%;
   height : 100%;
   position : relative;
   z-index : 2;
   overflow : hidden;
   border-radius : 22px;
}
	

.inner img
   {
   width : 100%;
   height : 100%;
   display : block;
   object-fit : cover; 
}
	
.dec 
	{
	position : absolute;
	inset : 0;
	pointer-events : none;
	z-index : 6;
}
	
.deci
	{
	position : absolute;
	opacity: 1;
	filter : drop-shadow(0 6px 10px rgba(255, 105, 180, 0.5));
}
	
.heart
	{
	display  : block;
	position : relative;
	width : 86px; 
	height : 86px;
	filter: drop-shadow(0 18px 24px rgba(255,105,180,1));
}
	
.heart::before
	{
	content : "";
	position : absolute;
	inset : 0;
	background : radial-gradient(circle at 40% 35%, rgba(255, 255, 255, 0.28) 0%, rgba(255, 255, 255,0.12)18%, rgba(255, 255, 255, 0)38%), linear-gradient(145deg, #ff8fa8 0%, #f06f93 52%, #ff7fb0 100%);
	clip-path : path("M 25 40 C 23 37 20 34 16 31 C 10 26 4 21 4 13 C 4 7 9 3 15 3 C 19 3 22 5 25 8 C 28 5 31 3 35 3 C 41 3 46 7 46 13 C 46 21 40 26 34 31 C 30 34 27 37 25 40 Z");
	border-radius : 14px;
    animation : boom 3s infinite linear;
}
	
.heart.big.tl { top : 1%; left : 3%; transform : rotate(-12deg); }
.heart.small.tl { top : -10%; left : 12%; transform : rotate(10deg); }
	
.shine 
  {
  position: absolute;
  right: 10px;
  bottom: 10px;
  width: 45px;
  height: 45px;
  background: white;
  clip-path: polygon(50% 0%, 62% 34%, 100% 50%, 62% 66%, 50% 100%, 38% 66%, 0% 50%, 38% 34%);
  opacity: 1;
  z-index: 6;
  pointer-events: none;
  animation : shine 3s infinite linear;
}

.shine.small {
		width: 22px;
		height: 22px;
		bottom: 7px;
		right: 40px;
		clip-path: polygon(50% 0%, 62% 34%, 100% 50%, 62% 66%, 50% 100%, 38% 66%, 0% 50%, 38% 34%);
		background: white;
		animation : shine 3s infinite linear;
	}
	
	@keyframes shine 
 {
   0% , 100% { opacity : 0.6; transform : scale(0.8); box-shadow :  none; } 
   50% , 60% { opacity : 1; transform : scale(1); box-shadow :  0 0 8px 55px rgba(255,255,255,1); }
 }
	
	@keyframes boom 
 {
   0% , 100% { opacity : 0.6; transform : scale(0.8); box-shadow :  none; } 
   50% , 60% { opacity : 1; transform : scale(1); box-shadow :  0 0 8px 45px rgba(255,105,180,1); }
 }
	
</style>

<body>
  <div class="frame">
   <div class="dec">
   	 <div class="icon heart deci big tl"></div>
   	 <div class="icon heart deci small tl"></div>
